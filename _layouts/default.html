<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,maximum-scale=2">
    <link rel="stylesheet" type="text/css" media="screen" href="{{ '/assets/css/style.css' | relative_url }}">
    {% seo %}
  </head>
  <body>
    <div id="header_wrap" class="outer">
        <header class="inner">
          <a id="forkme_banner" href="https://github.com/PrasheelVarma">View GitHub Profile</a>
          <h1 id="project_title">{{ site.title }}</h1>
          <h2 id="project_tagline">{{ site.description }}</h2>
          
          <button id="dark-mode-toggle" style="background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; cursor: pointer; padding: 5px 10px; border-radius: 5px; margin-top: 10px;">
            🌓 Toggle Dark Mode
          </button>
        </header>
    </div>

    <div id="main_content_wrap" class="outer">
      <section id="main_content" class="inner">
        {{ content }}
      </section>
    </div>

    <div id="footer_wrap" class="outer">
      <footer class="inner">
        <p class="copyright">THE ARCHIVES maintained by <strong>Prasheel Varma Datla</strong>.</p>
        <p>A sub-domain of <a href="https://prasheelvarma.dev">prasheelvarma.dev</a></p>
      </footer>
    </div>

    <script>
      const btn = document.getElementById("dark-mode-toggle");
      if (localStorage.getItem("theme") === "dark") { document.body.classList.add("dark-mode"); }
      btn.addEventListener("click", function() {
        document.body.classList.toggle("dark-mode");
        localStorage.setItem("theme", document.body.classList.contains("dark-mode") ? "dark" : "light");
      });
    </script>
  </body>
</html>
